quarkus:
  banner:
    enabled: false
  hibernate-orm:
    database:
      generation: none
  swagger-ui:
    always-include: true
    operations-sorter: method
  smallrye-openapi:
    info-title: ossrep-meter-api
    info-version: 1.0.0

'%dev':
  quarkus:
    flyway:
      migrate-at-start: true
      locations: db/migration,db/testdata
    hibernate-orm:
      log:
        sql: true
    log:
      level: INFO
      category:
        "com.ossrep":
          level: DEBUG

'%test':
  quarkus:
    flyway:
      migrate-at-start: true
      locations: db/migration,db/testdata
    hibernate-orm:
      log:
        sql: true
    log:
      level: INFO
      category:
        "com.ossrep":
          level: DEBUG

'%prod':
  quarkus:
    flyway:
      migrate-at-start: true
      locations: db/migration
    hibernate-orm:
      log:
        sql: true
    log:
      level: INFO
      category:
        "com.ossrep":
          level: INFO